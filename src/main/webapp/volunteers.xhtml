<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Volunteer Management Dashboard</title>
    <link rel="stylesheet" href="css/game-ui.css" />
</h:head>
<h:body class="has-sidebar">
    <div class="navbar">
        <h:link outcome="index" value="Drives Dashboard" styleClass="nav-link" />
        <h:link outcome="volunteers" value="Volunteer Management" styleClass="nav-link active" />
        <h:link outcome="tree-species" value="Manage Trees" styleClass="nav-link" />
        <h:link outcome="log-planting" value="Log Planting" styleClass="nav-link" />
        <h:link outcome="reports" value="Impact Reports" styleClass="nav-link" />
    </div>

    <div class="container quest-panel">
        <div class="header">
            <h1>Volunteer Management</h1>
            <h:button value="+ New Volunteer" outcome="add-volunteer" styleClass="btn"/>
        </div>
        
        <h:form>
            <h:dataTable value="#{volunteerController.volunteers}" var="vol" styleClass="data-table" 
                         rendered="#{not empty volunteerController.volunteers}">
                <h:column>
                    <f:facet name="header">Name</f:facet>
                    #{vol.name}
                </h:column>
                <h:column>
                    <f:facet name="header">Email Address</f:facet>
                    #{vol.email}
                </h:column>
                <h:column>
                    <f:facet name="header">Actions</f:facet>
                    <h:commandButton value="Delete" action="#{volunteerController.deleteVolunteer(vol.id)}" 
                                     styleClass="btn-delete" onclick="return confirm('Are you sure you want to delete this volunteer?');" />
                </h:column>
            </h:dataTable>
        </h:form>
        
        <h:panelGroup rendered="#{empty volunteerController.volunteers}" layout="block" styleClass="empty-state">
            No volunteers registered yet. Click "+ New Volunteer" to add one!
        </h:panelGroup>
    </div>
</h:body>
</html>
