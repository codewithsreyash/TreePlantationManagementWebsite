<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://xmlns.jcp.org/jsf/passthrough">
<h:head>
    <title>Log Planted Trees</title>
    <link rel="stylesheet" href="css/game-ui.css" />
</h:head>
<h:body class="has-sidebar">
    <div class="navbar">
        <h:link outcome="index" value="Drives Dashboard" styleClass="nav-link" />
        <h:link outcome="volunteers" value="Volunteer Management" styleClass="nav-link" />
        <h:link outcome="tree-species" value="Manage Trees" styleClass="nav-link" />
        <h:link outcome="log-planting" value="Log Planting" styleClass="nav-link active" />
    </div>

    <div class="form-card quest-form" style="margin: 40px auto;">
        <h2>Log Planted Trees</h2>
        <h:form>
            <div class="form-group">
                <h:outputLabel for="driveSelect" value="Select Plantation Drive" styleClass="form-label"/>
                <h:selectOneMenu id="driveSelect" value="#{plantationDriveController.selectedDriveId}" styleClass="form-control"
                                 required="true" requiredMessage="Drive is required">
                    <f:selectItems value="#{plantationDriveController.drives}" var="drive" 
                                   itemValue="#{drive.id}" itemLabel="#{drive.location} - #{drive.driveDate}" />
                </h:selectOneMenu>
                <h:message for="driveSelect" styleClass="error-msg"/>
            </div>
            
            <div class="form-group">
                <h:outputLabel for="treeSelect" value="Select Tree Species" styleClass="form-label"/>
                <h:selectOneMenu id="treeSelect" value="#{plantationDriveController.selectedTreeId}" styleClass="form-control"
                                 required="true" requiredMessage="Species is required">
                    <f:selectItems value="#{plantationDriveController.availableTrees}" var="tree" 
                                   itemValue="#{tree.id}" itemLabel="#{tree.name} (#{tree.scientificName})" />
                </h:selectOneMenu>
                <h:message for="treeSelect" styleClass="error-msg"/>
            </div>
            
            <div class="form-group">
                <h:outputLabel for="qty" value="Quantity Planted" styleClass="form-label"/>
                <h:inputText id="qty" value="#{plantationDriveController.quantity}" 
                             required="true" requiredMessage="Quantity is required" 
                             styleClass="form-control" p:type="number" p:min="1" p:placeholder="e.g., 50"/>
                <h:message for="qty" styleClass="error-msg"/>
            </div>
            
            <h:commandButton value="Submit Log" action="#{plantationDriveController.logPlanting}" styleClass="btn-submit"/>
        </h:form>
        
        <h:link outcome="index" value="← Back to Dashboard" styleClass="back-link"/>
    </div>
</h:body>
</html>
