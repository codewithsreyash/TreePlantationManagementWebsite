<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Plantation Drive Dashboard</title>
    <link rel="stylesheet" href="css/game-ui.css" />
</h:head>
<h:body class="has-sidebar">
    <div class="navbar">
        <h:link outcome="index" value="Drives Dashboard" styleClass="nav-link active" />
        <h:link outcome="volunteers" value="Volunteer Management" styleClass="nav-link" />
        <h:link outcome="tree-species" value="Manage Trees" styleClass="nav-link" />
        <h:link outcome="log-planting" value="Log Planting" styleClass="nav-link" />
    </div>

    <div class="container quest-panel main-content">
        <div class="header">
            <h1>Plantation Drive Dashboard</h1>
            <div>
                <h:button value="Assign Volunteer" outcome="assign-volunteer" styleClass="btn" style="background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); margin-right: 10px;"/>
                <h:button value="+ New Drive" outcome="add-drive" styleClass="btn"/>
            </div>
        </div>
        
        <h:dataTable value="#{plantationDriveController.drives}" var="drive" styleClass="data-table" 
                     rendered="#{not empty plantationDriveController.drives}">
            <h:column>
                <f:facet name="header">ID</f:facet>
                #{drive.id}
            </h:column>
            <h:column>
                <f:facet name="header">Location</f:facet>
                #{drive.location}
            </h:column>
            <h:column>
                <f:facet name="header">Date</f:facet>
                <h:outputText value="#{drive.driveDate}">
                    <f:convertDateTime pattern="MMM dd, yyyy"/>
                </h:outputText>
            </h:column>
            <h:column>
                <f:facet name="header">Volunteers Registered</f:facet>
                #{drive.volunteers.size()}
            </h:column>
            <h:column>
                <f:facet name="header">Total Trees Planted</f:facet>
                #{plantationDriveController.getTreeCount(drive.id)}
            </h:column>
        </h:dataTable>
        
        <h:panelGroup rendered="#{empty plantationDriveController.drives}" layout="block" styleClass="empty-state">
            No plantation drives found. Click "+ New Drive" to get started!
        </h:panelGroup>
    </div>
</h:body>
</html>
